<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Global page metadata and baseline typography -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans — HTML version</title>
    <!-- Load Inter from Google Fonts for consistent UI type -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Attach shared layout and visual styles for the cards -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Fixed label identifying this static HTML version -->
    <p class="page-label"><strong>HTML version</strong> — static markup</p>
    <!-- Main wrapper holding the pricing cards side by side -->
    <div class="cards-container">
        <!-- Hobby plan card: free entry tier -->
        <div class="card">
            <div class="card-top">
                <h3 class="card-title">Hobby</h3>
                <p class="card-price">
                    <span class="card-price-amount">Free</span>
                </p>
                <div class="card-content">
                    <!-- Text label for the feature list in this plan -->
                    <p class="includes-text">Includes:</p>
                    <!-- Feature list specific to the Hobby plan -->
                    <ul class="features-list">
                        <li>
                            <span class="checkmark">✓</span>
                            No credit card required
                        </li>
                        <li>
                            <span class="checkmark">✓</span>
                            Limited Agent requests
                        </li>
                        <li>
                            <span class="checkmark">✓</span>
                            Limited Tab completions
                        </li>
                    </ul>
                </div>
            </div>
            <!-- Secondary-style action for trying the free tier -->
            <button class="download-button secondary">Download</button>
        </div>

        <!-- Pro plan card: paid tier -->
        <div class="card">
            <div class="card-top">
                <h3 class="card-title">Pro</h3>
                <p class="card-price">
                    <span class="card-price-amount">$20</span>
                    <span class="card-price-period">/mo.</span>
                </p>
                <div class="card-content">
                    <p class="includes-text">Everything in Hobby, plus:</p>
                    <ul class="features-list">
                        <li>
                            <span class="checkmark">✓</span>
                            Extended limits on Agent
                        </li>
                        <li>
                            <span class="checkmark">✓</span>
                            Unlimited Tab completions
                        </li>
                        <li>
                            <span class="checkmark">✓</span>
                            Background Agents
                        </li>
                    </ul>
                </div>
            </div>
            <!-- Primary-style action for the Pro tier -->
            <button class="download-button primary">Download Pro</button>
        </div>
    </div>
</body>
</html>
